version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hris_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: hris_db
    ports:
      - "5433:5432"  # Changed to avoid conflict with other postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hris_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hris_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/hris_db
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8082","http://localhost:8083","http://localhost"]'
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: HRIS API
      DEBUG: "True"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - hris_network
    command: sh -c "sleep 5 && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hris_frontend
    restart: unless-stopped
    ports:
      - "8082:80"  # Main frontend port
      - "8083:80"  # Alternative port
    depends_on:
      - backend
    networks:
      - hris_network

  # Development Frontend (optional - for hot reload during development)
  frontend-dev:
    image: node:18-alpine
    container_name: hris_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    networks:
      - hris_network
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev

networks:
  hris_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
